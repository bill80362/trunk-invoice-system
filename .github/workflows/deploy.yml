name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.TRUNK_HOST }}
          username: ${{ secrets.TRUNK_USERNAME }}
          key: ${{ secrets.TRUNK_PRIVATE_KEY }}
          port: ${{ secrets.TRUNK_PORT }}
          script: |
            set -e
            cd /home/bill/trunk-invoice-system-cicd

            echo "Test" >> test.txt

            # 拉取最新程式碼
            git pull origin main

            # 安裝 PHP 套件（僅正式環境）
            composer install --no-dev --optimize-autoloader --no-interaction

            # 執行資料庫遷移
            php artisan migrate --force

            # 重建快取
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache

            # 重新載入 Octane（FrankenPHP）
            php artisan octane:reload
